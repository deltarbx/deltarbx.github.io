<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Heavy Close Trap</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #ff4444;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            cursor: pointer;
            user-select: none;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>
<body>

    <h1>CLICK TO INITIALIZE</h1>

    <script>
        // メインスレッドを完全にブロックしつつCPUを焼き切る重い処理（Web Workerを使わない直ガリ勉タスク）
        function spawnHeavyLoad() {
            const startTime = performance.now();
            // 約3秒間、CPUを100%近くに張り付かせてメインスレッドを完全に沈黙させる
            while (performance.now() - startTime < 3000) {
                Math.pow(Math.random(), Math.random()) * Math.sin(Math.random());
            }
        }

        document.body.addEventListener('click', async () => {
            try {
                await document.documentElement.requestFullscreen();
            } catch (err) {}

            document.querySelector('h1').innerText = "TRAP ARMED.\nTry to close this tab.";
        });

        // ユーザーがタブを閉じようとしたり、フォーカスを外したり、ナビゲーションしようとした瞬間を検知
        window.addEventListener('beforeunload', (e) => {
            // ブラウザ標準の「本当に移動しますか？」ダイアログを出す
            e.preventDefault();
            e.returnValue = '';

            // 閉じる・離脱の意志を見せた瞬間に激重処理をブチ込む
            spawnHeavyLoad();
        });

        // 画面からフォーカスが外れた（タブを切り替えようとしたり、他のウィンドウを選んだ）瞬間を検知
        window.addEventListener('blur', () => {
            spawnHeavyLoad();
        });
    </script>

</body>
</html>
