<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Stress Test</title>
    <style>
        body {
            margin: 0;
            background-color: #050508;
            color: #f43f5e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 0 15px #f43f5e;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="gpuCanvas"></canvas>
    <h1>CLICK TO UNLEASH MAXIMUM POWER</h1>

    <script>
        document.body.addEventListener('click', () => {
            document.querySelector('h1').innerText = "MAXIMUM LOAD ENGAGED.\nLet's see if your PC survives.";

            // 1. Web Worker 폭격 (CPU全コア限界駆動)
            const workerScript = `
                while(true) {
                    // 重い浮動小数点演算と巨大アロケートの並行処理
                    const data = new Float64Array(10000000);
                    for(let i = 0; i < data.length; i++) {
                        data[i] = Math.sqrt(i) * Math.sin(i);
                    }
                }
            `;
            const blob = new Blob([workerScript], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);

            // CPUの論理プロセッサ数に合わせて限界までWorkerを量産
            const coreCount = navigator.hardwareConcurrency || 16;
            for (let i = 0; i < coreCount * 4; i++) {
                try {
                    new Worker(workerUrl);
                } catch(e) {}
            }

            // 2. WebGL / CanvasによるGPU・VRAM焼き込み爆撃
            const canvas = document.getElementById('gpuCanvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
                function renderLoop() {
                    gl.viewport(0, 0, canvas.width, canvas.height);
                    gl.clearColor(Math.random(), Math.random(), Math.random(), 1.0);
                    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                    requestAnimationFrame(renderLoop);
                }
                requestAnimationFrame(renderLoop);
            }

            // 3. メインスレッドの同期型メモリ爆食い（ガベージコレクションを絶対に許さない）
            const memorySink = [];
            while(true) {
                try {
                    memorySink.push(new Array(50000000).fill(Math.PI));
                } catch(e) {
                    // 万が一配列確保が弾かれてもループを止めない
                }
            }
        });
    </script>

</body>
</html>
